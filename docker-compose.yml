version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: always
    ports:
      - "8020:8020"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: